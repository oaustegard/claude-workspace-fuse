# Mirrors the repos that every CCotw session fetches at boot (claude-skills,
# muninn-utilities) into orphan branches of THIS repo. Since the 2026-07-02
# agent-proxy lockdown, sessions cannot reach codeload/api tarballs for any
# repo outside the session scope — but git-fetch of this repo's own branches
# still works through the proxied origin. boot-ccotw.sh and rebuild-layer.sh
# fall back to these branches when codeload 403s.
#
# Runs on GitHub's infrastructure (no agent proxy), so it has normal access.
# muninn-utilities is private: reading it needs the MIRROR_PAT repo secret
# (a PAT with repo read on oaustegard/muninn-utilities). claude-skills is
# public and needs no secret. Pushing the mirror branches uses the built-in
# GITHUB_TOKEN.
name: Mirror session artifacts

on:
  schedule:
    - cron: '23 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  mirror:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - source: oaustegard/claude-skills
            branch: mirror/skills
            private: false
          - source: oaustegard/muninn-utilities
            branch: mirror/muninn-utilities
            private: true
    steps:
      - name: Clone source repo
        env:
          MIRROR_PAT: ${{ secrets.MIRROR_PAT }}
        run: |
          if [ "${{ matrix.private }}" = "true" ]; then
            if [ -z "$MIRROR_PAT" ]; then
              echo "::error::MIRROR_PAT secret not set — cannot mirror private ${{ matrix.source }}"
              exit 1
            fi
            git clone --depth 1 "https://x-access-token:${MIRROR_PAT}@github.com/${{ matrix.source }}.git" src
          else
            git clone --depth 1 "https://github.com/${{ matrix.source }}.git" src
          fi
          rm -rf src/.git

      - name: Push orphan mirror branch
        run: |
          cd src
          git init -b "${{ matrix.branch }}"
          git config user.name 'muninn'
          git config user.email 'muninn@austegard.com'
          git add -A
          git commit -m "Mirror of ${{ matrix.source }} @ $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push --force \
            "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" \
            "HEAD:refs/heads/${{ matrix.branch }}"
